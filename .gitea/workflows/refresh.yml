name: Refresh gosumdb on release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
      - '*'

jobs:
  refresh:
    runs-on: node-24-alpine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps (apk)
        shell: sh
        run: |
          set -e
          sed -i 's#https\?://dl-cdn.alpinelinux.org/alpine#http://mirrors.98e-1.net/alpine#g' /etc/apk/repositories
          apk update
          apk add --no-cache git ca-certificates curl tar xz gcompat

      - name: Get Go version from go.mod
        id: get_go_version
        shell: sh
        run: |
          set -e
          # Extract the 'go' directive from go.mod (e.g. 'go 1.25').
          v=$(awk '/^go /{print $2; exit}' go.mod || true)
          if [ -z "$v" ]; then
            echo "No 'go' directive found in go.mod, defaulting to 1.25"
            v=1.25
          fi
          echo "Detected go version: $v"
          echo "go-version=$v" >> $GITHUB_OUTPUT

      - name: Fetch tags
        shell: sh
        run: |
          git fetch --tags --prune --force origin || true

      - name: Determine module and tag, then refresh sum.golang.org
        shell: sh
        run: |
          set -eux

          module=$(awk '/^module /{print $2; exit}' go.mod)
          echo "Detected module: $module"
          module_go_version=$(awk '/^go /{print $2; exit}' go.mod || true)
          if [ -z "$module_go_version" ]; then
            module_go_version="${{ steps.get_go_version.outputs.go-version }}"
          fi
          echo "Using Go version: $module_go_version"
          tag=""
          if [ -n "${GITHUB_REF:-}" ]; then
            tag=${GITHUB_REF#refs/tags/}
          fi
          tag=${tag:-${GITEA_RELEASE_TAG:-${EVENT_RELEASE_TAG:-}}}
          if [ -z "$tag" ]; then
            tag=$(git describe --tags --exact-match 2>/dev/null || true)
          fi
          if [ -z "$tag" ]; then
            tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          fi

          if [ -z "$tag" ]; then
            echo "No tag found for this run — nothing to refresh. Exiting."
            exit 0
          fi

          echo "Refreshing gosumdb for $module@$tag"
          go_mod_version() {
            printf '%s\n' "$1" | awk -F. '{
              if (NF >= 2) print $1 "." $2;
              else print $1;
            }'
          }
          if command -v go >/dev/null 2>&1; then
            current_go=$(go version | awk '{print $3}' | sed 's/^go//')
          else
            current_go=""
          fi

          version_ge() {
            awk -v a="$1" -v b="$2" 'BEGIN{
              split(a, A, "."); split(b, B, ".");
              for (i=1; i<=3; i++) {
                ai = (i in A) ? A[i] : 0;
                bi = (i in B) ? B[i] : 0;
                if (ai+0 > bi+0) exit 0;
                if (ai+0 < bi+0) exit 1;
              }
              exit 0;
            }'
          }

          need_install=0
          if [ -z "$current_go" ]; then
            need_install=1
          else
            if ! version_ge "$current_go" "$module_go_version"; then
              need_install=1
            fi
          fi

          if [ "$need_install" -eq 1 ]; then
            echo "Installing Go $module_go_version because current is '$current_go'"
            arch=$(uname -m)
            case "$arch" in
              x86_64|amd64) goarch="amd64" ;;
              aarch64|arm64) goarch="arm64" ;;
              *) goarch="amd64" ;;
            esac
            url="http://mirrors.98e-1.net/golang/go${module_go_version}.linux-${goarch}.tar.gz"
            echo "Downloading: $url"
            curl -fsSL -o /tmp/go.tgz "$url"
            rm -rf /usr/local/go || true
            tar -C /usr/local -xzf /tmp/go.tgz
            export PATH=/usr/local/go/bin:$PATH
            /usr/local/go/bin/go version
            echo "Installed: $(/usr/local/go/bin/go version)"
          else
            echo "Existing go is sufficient: $current_go >= $module_go_version"
          fi
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          printf '%s\n' 'module refresh-gosumdb-temp' '' "go $(go_mod_version "$module_go_version")" > go.mod
          env GOSUMDB=sum.golang.org GOPROXY=https://goproxy.cn,direct GOFLAGS='' go get "$module@$tag"
          cd - >/dev/null || true
          rm -rf "$TMPDIR"
